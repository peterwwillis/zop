name: Test

on:
  # Run on direct pushes to the default branch only (not feature branches, to
  # avoid a double-run when the same commit is also covered by a pull_request
  # event from an open PR).
  push:
    branches: [main]
    tags-ignore: ["v*"]
  pull_request:

# Cancel any in-progress run for the same ref so we never queue up stale runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  WHISPER_CPP_VERSION: v1.8.3
  ANDROID_APP_ID: com.zop.app
  ANDROID_ARCH: arm64

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # On Linux collect a coverage profile; on Windows omit it to avoid a
          # PowerShell/Go incompatibility where `-coverprofile=coverage.out ./...`
          # causes Go to try to build ".out" as a package.
          - os: ubuntu-latest
            test_args: "-race -coverprofile=coverage.out"
          # - os: windows-latest
          #   test_args: "-race"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: make deps

      - name: Vet
        run: make vet

      - name: Build
        run: make build

      - name: Test
        run: make test TEST_ARGS="${{ matrix.test_args }}"

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
          retention-days: 7

  test-whisper:
    name: Test with whisper (Linux/amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: make deps

      - name: Fetch and build whisper.cpp
        run: make whisper-fetch

      - name: Vet (whisper)
        run: make vet-whisper

      - name: Build (whisper)
        run: make build-whisper

      - name: Test (whisper)
        run: make test-whisper

  release-dry-run-build:
    name: Release dry run build (${{ matrix.goos }}/${{ matrix.goarch }})
    if: github.event_name == 'pull_request'
    needs: [test, test-whisper]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            cgo: "1"
            tags: "whisper"
            suffix: ""
            whisper: true
            runner: ubuntu-latest
          - goos: linux
            goarch: amd64
            cgo: "0"
            tags: ""
            suffix: "-nowhisper"
            whisper: false
            runner: ubuntu-latest
          - goos: linux
            goarch: arm64
            cgo: "1"
            tags: "whisper"
            suffix: ""
            whisper: true
            runner: ubuntu-24.04-arm
          - goos: linux
            goarch: arm64
            cgo: "0"
            tags: ""
            suffix: "-nowhisper"
            whisper: false
            runner: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: make deps

      - name: Set binary name
        id: binary
        shell: bash
        run: |
          NAME="zop-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}"
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"

      - name: Fetch whisper.cpp
        if: ${{ matrix.whisper }}
        run: make whisper-fetch

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
        run: |
          make build-bin \
            GOOS="${{ matrix.goos }}" \
            GOARCH="${{ matrix.goarch }}" \
            CGO_ENABLED="${{ matrix.cgo }}" \
            BUILD_TAGS="${{ matrix.tags }}" \
            VERSION="pr-dry-run" \
            BINARY="${{ steps.binary.outputs.name }}"

  release-dry-run-android:
    name: Release dry run Android APK
    if: github.event_name == 'pull_request'
    needs: [test, test-whisper]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enable KVM for Android hardware acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: make deps

      - name: Install fyne-cross
        run: |
          go install github.com/fyne-io/fyne-cross@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build APK
        run: make android-apk ANDROID_APP_ID="$ANDROID_APP_ID" ANDROID_ARCH="$ANDROID_ARCH"

  screenshot:
    name: Capture UI screenshot
    if: github.event_name == 'pull_request'
    needs: [test, test-whisper]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: make deps

      - name: Capture screenshot
        env:
          ZOP_SCREENSHOT_PATH: ${{ github.workspace }}/artifacts/zop-mobile-ui.png
        run: |
          mkdir -p artifacts
          make screenshot

      - name: Upload screenshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: ui-screenshot
          path: artifacts/zop-mobile-ui.png
          retention-days: 7

      - name: Publish screenshot to branch
        if: github.event.pull_request.head.repo.full_name == github.repository
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin ui-screenshots || true
          if git show-ref --quiet refs/remotes/origin/ui-screenshots; then
            git switch ui-screenshots
            git reset --hard origin/ui-screenshots
          else
            git switch --orphan ui-screenshots
            git rm -rf . || true
          fi

          mkdir -p "pr-${PR_NUMBER}"
          cp "${{ github.workspace }}/artifacts/zop-mobile-ui.png" "pr-${PR_NUMBER}/zop-mobile-ui.png"
          git add "pr-${PR_NUMBER}/zop-mobile-ui.png"

          if git diff --cached --quiet; then
            echo "No screenshot changes to commit."
          else
            git commit -m "Add UI screenshot for PR #${PR_NUMBER}"
            git push origin ui-screenshots
          fi

      - name: Comment PR with screenshot
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: zop-mobile-ui
          message: |
            ### Mobile UI Screenshot
            ![zop mobile UI](https://raw.githubusercontent.com/${{ github.repository }}/ui-screenshots/pr-${{ github.event.pull_request.number }}/zop-mobile-ui.png)
