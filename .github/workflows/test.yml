name: Test

on:
  # Run on direct pushes to the default branch only (not feature branches, to
  # avoid a double-run when the same commit is also covered by a pull_request
  # event from an open PR).
  push:
    branches: [main]
    tags-ignore: ["v*"]
  pull_request:

# Cancel any in-progress run for the same ref so we never queue up stale runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # On Linux collect a coverage profile; on Windows omit it to avoid a
          # PowerShell/Go incompatibility where `-coverprofile=coverage.out ./...`
          # causes Go to try to build ".out" as a package.
          - os: ubuntu-latest
            test_args: "-race -coverprofile=coverage.out"
          - os: windows-latest
            test_args: "-race"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ${{ matrix.test_args }} ./...

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
          retention-days: 7
