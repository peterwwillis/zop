name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.2.3). If missing, it will be created automatically."
        required: true
        type: string

# Only allow one release workflow per tag to run at a time.
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  resolve-tag:
    name: Resolve release tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      checkout_ref: ${{ steps.ensure.outputs.checkout_ref }}
      target_commitish: ${{ steps.ensure.outputs.target_commitish }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine tag
        id: tag
        env:
          INPUT_TAG: ${{ inputs.tag }}
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            # Validate: must be non-empty and contain only safe tag characters
            if [ -z "$INPUT_TAG" ] || printf '%s' "$INPUT_TAG" | grep -qE '[^a-zA-Z0-9._/\-]'; then
              echo "Error: tag input contains invalid characters." >&2
              exit 1
            fi
            printf 'tag=%s\n' "$INPUT_TAG" >> "$GITHUB_OUTPUT"
          else
            printf 'tag=%s\n' "$REF_NAME" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve checkout ref and commitish
        id: ensure
        env:
          RELEASE_TAG: ${{ steps.tag.outputs.tag }}
          EVENT_NAME: ${{ github.event_name }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          if git rev-parse --verify "refs/tags/${RELEASE_TAG}" > /dev/null 2>&1; then
            echo "Tag '${RELEASE_TAG}' already exists."
            TAG_SHA=$(git rev-list -n 1 "refs/tags/${RELEASE_TAG}")
            printf 'checkout_ref=%s\n' "$RELEASE_TAG" >> "$GITHUB_OUTPUT"
            printf 'target_commitish=%s\n' "$TAG_SHA" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$EVENT_NAME" != "workflow_dispatch" ]; then
            echo "Error: tag '${RELEASE_TAG}' does not exist in the repository." >&2
            exit 1
          fi

          echo "Tag '${RELEASE_TAG}' does not exist; release creation will create it at ${GITHUB_SHA}."
          printf 'checkout_ref=%s\n' "$GITHUB_SHA" >> "$GITHUB_OUTPUT"
          printf 'target_commitish=%s\n' "$GITHUB_SHA" >> "$GITHUB_OUTPUT"

  test:
    name: Test before release
    needs: resolve-tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-tag.outputs.checkout_ref }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Fetch whisper.cpp
        run: |
          git clone --depth 1 --branch v1.8.3 https://github.com/ggerganov/whisper.cpp internal/whisper/whisper.cpp
          cmake -S internal/whisper/whisper.cpp \
            -B internal/whisper/whisper.cpp/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DWHISPER_BUILD_TESTS=OFF \
            -DWHISPER_BUILD_EXAMPLES=OFF \
            -DWHISPER_BUILD_SERVER=OFF
          cmake --build internal/whisper/whisper.cpp/build --target whisper

      - name: Vet
        run: go vet -tags whisper ./...

      - name: Test
        env:
          CGO_ENABLED: "1"
        run: go test -race -tags whisper ./...

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    needs: [resolve-tag, test]
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          # Linux (whisper-enabled default + no-whisper variant)
          - goos: linux
            goarch: amd64
            cgo: "1"
            tags: "whisper"
            suffix: ""
            whisper: true
            runner: ubuntu-latest
          - goos: linux
            goarch: amd64
            cgo: "0"
            tags: ""
            suffix: "-nowhisper"
            whisper: false
            runner: ubuntu-latest
          - goos: linux
            goarch: arm64
            cgo: "1"
            tags: "whisper"
            suffix: ""
            whisper: true
            runner: ubuntu-24.04-arm
          - goos: linux
            goarch: arm64
            cgo: "0"
            tags: ""
            suffix: "-nowhisper"
            whisper: false
            runner: ubuntu-24.04-arm
          - goos: darwin
            goarch: arm64
            cgo: "1"
            tags: "whisper"
            suffix: ""
            whisper: true
            runner: [ self-hosted, macOS, ARM64 ]
          - goos: darwin
            goarch: arm64
            cgo: "0"
            tags: ""
            suffix: "-nowhisper"
            whisper: false
            runner: [ self-hosted, macOS, ARM64 ]
          # Windows (no-whisper only for now)
          #- goos: windows
          #  goarch: amd64
          #  cgo: "0"
          #  tags: ""
          #  suffix: "-nowhisper"
          #  whisper: false
          #- goos: windows
          #  goarch: arm64
          #  cgo: "0"
          #  tags: ""
          #  suffix: "-nowhisper"
          #  whisper: false

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-tag.outputs.checkout_ref }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: |
          go mod download

      - name: Set binary name
        id: binary
        shell: bash
        run: |
          NAME="zop-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goarm }}" != "" ]; then
            NAME="${NAME}v${{ matrix.goarm }}"
          fi
          if [ "${{ matrix.suffix }}" != "" ]; then
            NAME="${NAME}${{ matrix.suffix }}"
          fi
          if [ "${{ matrix.goos }}" = "windows" ]; then
            NAME="${NAME}.exe"
          fi
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"

      - name: Fetch whisper.cpp
        if: ${{ matrix.whisper }}
        run: |
            git clone --depth 1 --branch v1.8.3 https://github.com/ggerganov/whisper.cpp internal/whisper/whisper.cpp
            cmake -S internal/whisper/whisper.cpp \
              -B internal/whisper/whisper.cpp/build \
              -DCMAKE_BUILD_TYPE=Release \
              -DBUILD_SHARED_LIBS=OFF \
              -DWHISPER_BUILD_TESTS=OFF \
              -DWHISPER_BUILD_EXAMPLES=OFF \
              -DWHISPER_BUILD_SERVER=OFF
            cmake --build internal/whisper/whisper.cpp/build --target whisper

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: ${{ matrix.cgo }}
        run: |
          TAGS="${{ matrix.tags }}"
          BUILD_ARGS=(
            -ldflags="-s -w -X github.com/peterwwillis/zop/internal/cli.Version=${{ needs.resolve-tag.outputs.tag }}"
            -o "${{ steps.binary.outputs.name }}"
            ./cmd/zop
          )
          if [ -n "$TAGS" ]; then
            BUILD_ARGS=(-tags "$TAGS" "${BUILD_ARGS[@]}")
          fi
          go build "${BUILD_ARGS[@]}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.binary.outputs.name }}
          path: ${{ steps.binary.outputs.name }}
          retention-days: 1

  android:
    name: Build Android APK
    needs: [resolve-tag, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-tag.outputs.checkout_ref }}

      - name: Enable KVM for Android hardware acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Install fyne-cross
        run: |
          go install github.com/fyne-io/fyne-cross@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build APK
        run: |
          fyne-cross android -app-id com.zop.app -arch arm64 ./cmd/zop-mobile
          APK_PATH=$(find fyne-cross/dist -type f -name "*.apk" -print -quit)
          if [ -z "$APK_PATH" ]; then
            echo "APK not found under fyne-cross/dist" >&2
            exit 1
          fi
          cp "$APK_PATH" "zop-android-arm64.apk"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zop-android-arm64.apk
          path: zop-android-arm64.apk
          retention-days: 1

  release:
    name: Create GitHub Release
    needs: [resolve-tag, build, android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve-tag.outputs.checkout_ref }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4.1.8
        with:
          path: dist/
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-tag.outputs.tag }}
          target_commitish: ${{ needs.resolve-tag.outputs.target_commitish }}
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(needs.resolve-tag.outputs.tag, '-') }}
