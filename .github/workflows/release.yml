name: Release

on:
  push:
    tags:
      - "v*"

# Only allow one release workflow per tag to run at a time.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  test:
    name: Test before release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race ./...

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # Linux (whisper-enabled default + no-whisper variant)
          - goos: linux
            goarch: amd64
            cgo: "1"
            tags: "whisper"
            suffix: ""
            whisper: true
          - goos: linux
            goarch: amd64
            cgo: "0"
            tags: ""
            suffix: "-nowhisper"
            whisper: false
          - goos: linux
            goarch: arm64
            cgo: "0"
            tags: ""
            suffix: "-nowhisper"
            whisper: false
          # Windows (no-whisper only for now)
          - goos: windows
            goarch: amd64
            cgo: "0"
            tags: ""
            suffix: "-nowhisper"
            whisper: false
          - goos: windows
            goarch: arm64
            cgo: "0"
            tags: ""
            suffix: "-nowhisper"
            whisper: false
          # macOS builds are intentionally excluded until a self-hosted runner is provided.

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Set binary name
        id: binary
        shell: bash
        run: |
          NAME="zop-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goarm }}" != "" ]; then
            NAME="${NAME}v${{ matrix.goarm }}"
          fi
          if [ "${{ matrix.suffix }}" != "" ]; then
            NAME="${NAME}${{ matrix.suffix }}"
          fi
          if [ "${{ matrix.goos }}" = "windows" ]; then
            NAME="${NAME}.exe"
          fi
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"

      - name: Fetch whisper.cpp
        if: ${{ matrix.whisper }}
        run: |
          git clone --depth 1 --branch v1.8.3 https://github.com/ggerganov/whisper.cpp internal/whisper/whisper.cpp
          cmake -S internal/whisper/whisper.cpp \
            -B internal/whisper/whisper.cpp/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DWHISPER_BUILD_TESTS=OFF \
            -DWHISPER_BUILD_EXAMPLES=OFF \
            -DWHISPER_BUILD_SERVER=OFF
          cmake --build internal/whisper/whisper.cpp/build --target whisper

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: ${{ matrix.cgo }}
        run: |
          TAGS="${{ matrix.tags }}"
          TAG_ARGS=()
          if [ -n "$TAGS" ]; then
            TAG_ARGS=(-tags "$TAGS")
          fi
          go build \
            "${TAG_ARGS[@]}" \
            -ldflags="-s -w -X github.com/peterwwillis/zop/internal/cli.Version=${{ github.ref_name }}" \
            -o "${{ steps.binary.outputs.name }}" \
            ./cmd/zop

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.binary.outputs.name }}
          path: ${{ steps.binary.outputs.name }}
          retention-days: 1

  android:
    name: Build Android APK
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Install fyne-cross
        run: |
          go install github.com/fyne-io/fyne-cross@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build APK
        run: |
          fyne-cross android -app-id com.zop.app -arch arm64 ./cmd/zop-mobile
          APK_PATH=$(find fyne-cross/dist/android -name "*.apk" -print -quit)
          if [ -z "$APK_PATH" ]; then
            echo "APK not found in fyne-cross/dist/android" >&2
            exit 1
          fi
          cp "$APK_PATH" "zop-android-arm64.apk"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zop-android-arm64.apk
          path: zop-android-arm64.apk
          retention-days: 1

  release:
    name: Create GitHub Release
    needs: [build, android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4.1.8
        with:
          path: dist/
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
