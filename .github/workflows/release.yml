name: Release

on:
  push:
    tags:
      - "v*"

# Only allow one release workflow per tag to run at a time.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  test:
    name: Test before release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race ./...

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # Linux (whisper-enabled default + no-whisper variant)
          - goos: linux
            goarch: amd64
            cgo: "1"
            tags: "whisper"
            suffix: ""
            whisper: true
          - goos: linux
            goarch: amd64
            cgo: "0"
            tags: ""
            suffix: "-nowhisper"
            whisper: false
          - goos: linux
            goarch: arm64
            cgo: "0"
            tags: ""
            suffix: "-nowhisper"
            whisper: false
          # Windows (no-whisper only for now)
          - goos: windows
            goarch: amd64
            cgo: "0"
            tags: ""
            suffix: "-nowhisper"
            whisper: false
          - goos: windows
            goarch: arm64
            cgo: "0"
            tags: ""
            suffix: "-nowhisper"
            whisper: false
          # macOS builds are intentionally excluded until a self-hosted runner is provided.
          # Android is built as a proper APK in the build-android job.

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Set binary name
        id: binary
        shell: bash
        run: |
          NAME="zop-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goarm }}" != "" ]; then
            NAME="${NAME}v${{ matrix.goarm }}"
          fi
          if [ "${{ matrix.suffix }}" != "" ]; then
            NAME="${NAME}${{ matrix.suffix }}"
          fi
          if [ "${{ matrix.goos }}" = "windows" ]; then
            NAME="${NAME}.exe"
          fi
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"

      - name: Fetch whisper.cpp
        if: ${{ matrix.whisper }}
        run: |
          git clone --depth 1 --branch v1.8.3 https://github.com/ggerganov/whisper.cpp internal/whisper/whisper.cpp
          make -C internal/whisper/whisper.cpp libwhisper.a

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: ${{ matrix.cgo }}
        run: |
          TAGS="${{ matrix.tags }}"
          TAG_ARGS=()
          if [ -n "$TAGS" ]; then
            TAG_ARGS=(-tags "$TAGS")
          fi
          go build \
            "${TAG_ARGS[@]}" \
            -ldflags="-s -w -X github.com/peterwwillis/zop/internal/cli.Version=${{ github.ref_name }}" \
            -o "${{ steps.binary.outputs.name }}" \
            ./cmd/zop

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.binary.outputs.name }}
          path: ${{ steps.binary.outputs.name }}
          retention-days: 1

  build-android:
    name: Build Android APK
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Go dependencies
        run: go mod download

      - name: Install Android SDK packages
        run: |
          sdkmanager --sdk_root="$ANDROID_HOME" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;27.2.12479018" < /dev/null
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> "$GITHUB_ENV"

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          gomobile init

      - name: Build Go library (zoplib.aar)
        run: |
          mkdir -p android/app/libs
          gomobile bind \
            -o android/app/libs/zoplib.aar \
            -target android \
            -androidapi 21 \
            -ldflags="-X github.com/peterwwillis/zop/internal/cli.Version=${{ github.ref_name }}" \
            github.com/peterwwillis/zop/internal/zoplib

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Build release APK
        run: gradle -p android assembleRelease

      - name: Rename APK
        run: |
          mv android/app/build/outputs/apk/release/app-release-unsigned.apk \
             zop-android-${{ github.ref_name }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: zop-android-${{ github.ref_name }}
          path: zop-android-${{ github.ref_name }}.apk
          retention-days: 1

  release:
    name: Create GitHub Release
    needs: [build, build-android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4.1.8
        with:
          path: dist/
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
