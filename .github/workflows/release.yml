name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.2.3). If missing, it will be created automatically."
        required: true
        type: string

# Only allow one release workflow per tag to run at a time.
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  resolve-tag:
    name: Resolve release tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      checkout_ref: ${{ steps.ensure.outputs.checkout_ref }}
      target_commitish: ${{ steps.ensure.outputs.target_commitish }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine tag
        id: tag
        env:
          INPUT_TAG: ${{ inputs.tag }}
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            # Validate: must be non-empty and contain only safe tag characters
            if [ -z "$INPUT_TAG" ] || printf '%s' "$INPUT_TAG" | grep -qE '[^a-zA-Z0-9._/\-]'; then
              echo "Error: tag input contains invalid characters." >&2
              exit 1
            fi
            printf 'tag=%s\n' "$INPUT_TAG" >> "$GITHUB_OUTPUT"
          else
            printf 'tag=%s\n' "$REF_NAME" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve checkout ref and commitish
        id: ensure
        env:
          RELEASE_TAG: ${{ steps.tag.outputs.tag }}
          EVENT_NAME: ${{ github.event_name }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          if git rev-parse --verify "refs/tags/${RELEASE_TAG}" > /dev/null 2>&1; then
            echo "Tag '${RELEASE_TAG}' already exists."
            TAG_SHA=$(git rev-list -n 1 "refs/tags/${RELEASE_TAG}")
            printf 'checkout_ref=%s\n' "$RELEASE_TAG" >> "$GITHUB_OUTPUT"
            printf 'target_commitish=%s\n' "$TAG_SHA" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$EVENT_NAME" != "workflow_dispatch" ]; then
            echo "Error: tag '${RELEASE_TAG}' does not exist in the repository." >&2
            exit 1
          fi

          echo "Tag '${RELEASE_TAG}' does not exist; release creation will create it at ${GITHUB_SHA}."
          printf 'checkout_ref=%s\n' "$GITHUB_SHA" >> "$GITHUB_OUTPUT"
          printf 'target_commitish=%s\n' "$GITHUB_SHA" >> "$GITHUB_OUTPUT"

  test:
    name: Test before release
    needs: resolve-tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-tag.outputs.checkout_ref }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: make deps

      - name: Fetch whisper.cpp
        run: make whisper-fetch

      - name: Fetch sherpa-onnx
        run: make tts-fetch

      - name: Vet
        run: make vet BUILD_TAGS="whisper tts"

      - name: Test
        run: make test BUILD_TAGS="whisper tts"

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }}${{ matrix.suffix }})
    needs: [resolve-tag, test]
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          # Linux amd64
          - goos: linux
            goarch: amd64
            cgo: "1"
            tags: "whisper tts"
            suffix: ""
            whisper: true
            tts: true
            static: true
            runner: ubuntu-latest
          - goos: linux
            goarch: amd64
            cgo: "1"
            tags: "whisper"
            suffix: "-whisperonly"
            whisper: true
            tts: false
            static: true
            runner: ubuntu-latest
          - goos: linux
            goarch: amd64
            cgo: "0"
            tags: ""
            suffix: "-novoice"
            whisper: false
            tts: false
            static: false
            runner: ubuntu-latest

          # Linux arm64
          - goos: linux
            goarch: arm64
            cgo: "1"
            tags: "whisper tts"
            suffix: ""
            whisper: true
            tts: true
            static: true
            runner: ubuntu-24.04-arm
          - goos: linux
            goarch: arm64
            cgo: "1"
            tags: "whisper"
            suffix: "-whisperonly"
            whisper: true
            tts: false
            static: true
            runner: ubuntu-24.04-arm
          - goos: linux
            goarch: arm64
            cgo: "0"
            tags: ""
            suffix: "-novoice"
            whisper: false
            tts: false
            static: false
            runner: ubuntu-24.04-arm

          # Darwin arm64
          - goos: darwin
            goarch: arm64
            cgo: "1"
            tags: "whisper tts"
            suffix: ""
            whisper: true
            tts: true
            static: false
            runner: [ self-hosted, macOS, ARM64 ]
          - goos: darwin
            goarch: arm64
            cgo: "1"
            tags: "whisper"
            suffix: "-whisperonly"
            whisper: true
            tts: false
            static: false
            runner: [ self-hosted, macOS, ARM64 ]
          - goos: darwin
            goarch: arm64
            cgo: "0"
            tags: ""
            suffix: "-novoice"
            whisper: false
            tts: false
            static: false
            runner: [ self-hosted, macOS, ARM64 ]

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-tag.outputs.checkout_ref }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: make deps

      - name: Set binary name
        id: binary
        shell: bash
        run: |
          NAME="zop-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goarm }}" != "" ]; then
            NAME="${NAME}v${{ matrix.goarm }}"
          fi
          if [ "${{ matrix.suffix }}" != "" ]; then
            NAME="${NAME}${{ matrix.suffix }}"
          fi
          if [ "${{ matrix.goos }}" = "windows" ]; then
            NAME="${NAME}.exe"
          fi
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"

      - name: Fetch whisper.cpp
        if: ${{ matrix.whisper }}
        run: make whisper-fetch

      - name: Fetch sherpa-onnx
        if: ${{ matrix.tts }}
        run: make tts-fetch

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: ${{ matrix.cgo }}
        run: |
          TARGET="build-bin"
          if [ "${{ matrix.static }}" = "true" ]; then
            TARGET="build-static"
          fi
          
          make $TARGET \
            GOOS="${{ matrix.goos }}" \
            GOARCH="${{ matrix.goarch }}" \
            GOARM="${{ matrix.goarm }}" \
            CGO_ENABLED="${{ matrix.cgo }}" \
            BUILD_TAGS="${{ matrix.tags }}" \
            VERSION="${{ needs.resolve-tag.outputs.tag }}" \
            BINARY="${{ steps.binary.outputs.name }}"
          
          # If it was a static build, it created BINARY-static. 
          # Move it to BINARY to match expected release name.
          if [ "${{ matrix.static }}" = "true" ]; then
            mv "${{ steps.binary.outputs.name }}-static" "${{ steps.binary.outputs.name }}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.binary.outputs.name }}
          path: ${{ steps.binary.outputs.name }}
          if-no-files-found: error
          retention-days: 1

  android:
    name: Build Android APK
    needs: [resolve-tag, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-tag.outputs.checkout_ref }}

      - name: Enable KVM for Android hardware acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: make deps

      - name: Install fyne-cross
        run: |
          go install github.com/fyne-io/fyne-cross@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build APK
        run: make android-apk ANDROID_APP_ID="com.zop.app" ANDROID_ARCH="arm64"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zop-android-arm64.apk
          path: zop-android-arm64.apk
          retention-days: 1

  release:
    name: Create GitHub Release
    needs: [resolve-tag, build, android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve-tag.outputs.checkout_ref }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4.1.8
        with:
          path: dist/
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-tag.outputs.tag }}
          target_commitish: ${{ needs.resolve-tag.outputs.target_commitish }}
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(needs.resolve-tag.outputs.tag, '-') }}
